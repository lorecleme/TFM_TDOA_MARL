env: "mpe"

env_args:
  key: tdoa_tracking
  map_name: ""
  num_agents: 3
  num_landmarks: 1
  time_limit: 100
  target_movable: False
  target_speed_mult: 0.0
  noise_std: 0.05
  target_pos_mode: "tdoa_estimate"    # Plan B1: TDOA solver feeds position estimates
  # Minimal winning recipe: surround + distance only
  reward_dist_coeff: 0.01
  reward_surround_coeff: 2.0
  reward_triangle_coeff: 0.0
  reward_rmse_coeff: 0.0
  reward_coverage_coeff: 0.0
  reward_simple_dist_coeff: 0.0
  reward_stillness_coeff: 0.0
  surround_gate_distance: 10000.0
  reward_discrete: False
  reward_rendundant: False

standardise_returns: False
standardise_rewards: False

use_amp: True

save_animation: True
use_tensorboard: True
local_results_path: "results_3v1_tdoa_estimate"
save_model: True
save_model_interval: 50000
test_greedy: True
test_nepisode: 30
test_interval: 25000
log_interval: 25000
animation_interval: 50000
animation_interval_evaluation: 100
runner_log_interval: 5000
learner_log_interval: 5000
t_max: 500000
