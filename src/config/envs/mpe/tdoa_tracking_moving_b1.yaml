env: "mpe"

env_args:
  key: tdoa_tracking
  map_name: ""
  num_agents: 3
  num_landmarks: 1
  time_limit: 100
  target_movable: True
  target_speed_mult: 1.0
  noise_std: 0.05
  reward_discrete: False
  reward_rendundant: False
  target_pos_mode: "tdoa_estimate"
  hide_target_positions: False

standardise_returns: False
standardise_rewards: False

# logs
save_animation: True
use_tensorboard: True
local_results_path: "results_3v1_tdoa_estimate_moving"
save_model: True
save_model_interval: 50000
test_greedy: True
test_nepisode: 30
test_interval: 10000
log_interval: 10000
animation_interval: 40000
animation_interval_evaluation: 100
runner_log_interval: 10000
learner_log_interval: 10000
t_max: 500000
