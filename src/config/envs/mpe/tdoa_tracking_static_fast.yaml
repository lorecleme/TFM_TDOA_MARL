env: "mpe"

env_args:
  key: tdoa_tracking
  map_name: ""
  num_agents: 3
  num_landmarks: 1
  time_limit: 100
  target_movable: False
  target_speed_mult: 0.0
  noise_std: 0.05
  reward_discrete: False
  reward_rendundant: False
  target_pos_mode: "ground_truth"
  hide_target_positions: False

standardise_returns: False
standardise_rewards: False

# logs — reduced overhead vs tdoa_tracking_static.yaml
save_animation: False              # was True — kills throughput
use_tensorboard: True
local_results_path: "results_tdoa_static_fast"
save_model: True
save_model_interval: 50000
test_greedy: True
test_nepisode: 30
test_interval: 5000
log_interval: 5000
animation_interval: 1000000        # effectively off during training
animation_interval_evaluation: 100
runner_log_interval: 5000
learner_log_interval: 5000
t_max: 500000                      # was 2000000 — 500K matches original paper
