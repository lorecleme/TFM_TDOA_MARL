# --- TransformerQMix LARGE - scaled for RTX 3060 8GB VRAM ---

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000       # faster exploit — parallel runner sees 64 eps/run

runner: "parallel"               # Run multiple envs in parallel to feed GPU
batch_size_run: 64               # 64 parallel environments
buffer_size: 25000               # Larger replay buffer
batch_size: 64                   # Larger training batch

# update the target network every {} episodes
target_update_interval: 200

# parameters of the transformer agent (SCALED UP)
mac: "n_mac"
agent: "n_transf"
agent_output_type: q
emb: 64                           # was 32
heads: 8                          # was 4
depth: 4                          # was 2
ff_hidden_mult: 4
dropout: 0

# parameters of the transformer mixer (SCALED UP)
mixer: "transf_mixer"
mixer_emb: 64                     # was 32
mixer_heads: 8                    # was 4
mixer_depth: 4                    # was 2
qmix_pos_func: "abs"

# parameters for the learner
learner: "nq_transf_learner"
weight_decay: 0
optimizer: "adam"
lr: 0.001                         # back to base value
td_lambda: 0.6                    # back to base value — proper credit across 100-step episodes
grad_norm_clip: 10
updates_per_batch: 8              # was 32 — too aggressive, overfits to noise


# to keep the token dimension fixed, observation id and last action should not be included
obs_agent_id: False
obs_last_action: False
env_args:
  obs_entity_mode: True
  state_entity_mode: True

name: "transf_qmix_large"