# --- TransformerQMix with enhanced visualization ---
# Based on transf_qmix.yaml but with visualization features enabled

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 100000 

runner: "episode"  # Standard episode runner
buffer_size: 5000 
batch_size: 32

# update the target network every {} episodes
target_update_interval: 200

# parameters of the transformer agent
mac: "n_mac"
agent: "n_transf"
agent_output_type: q
emb: 32 # embedding dimension of transformer
heads: 4 # head number of transformer
depth: 2 # block number of transformer
ff_hidden_mult: 4 # relative dimension of hidden layer of ff after attention
dropout: 0 # multi-head attention dropout

# parameters of the transformer mixer
mixer: "transf_mixer"
mixer_emb: 32 # embedding dimension of transformer
mixer_heads: 4 # head number of transformer
mixer_depth: 2 # block number of transformer
qmix_pos_func: "abs" # function to impose monotonic constraint

# parameters for the learner 
learner: "nq_transf_learner"
weight_decay: 0
optimizer: "adam"
lr: 0.001
td_lambda: 0.6

# to keep the token dimension fixed, observaion id and last action should not be included
obs_agent_id: False # Include the agent's one_hot id in the observation
obs_last_action: False # Include the agent's last action (one_hot) in the observation
env_args:
  obs_entity_mode: True
  state_entity_mode: True

# Visualization settings
viz_interval: 5000  # Update visualizations every 5000 timesteps
create_summary_gif: True  # Create animated GIF of training progress
save_animation: True  # Save episode animations
animation_interval: 10000  # Save animation every 10000 timesteps
animation_interval_evaluation: 1  # Save animation for every evaluation episode

# Logging and saving
save_model: True
save_model_interval: 100000
test_interval: 5000  # Test every 5000 timesteps
test_nepisode: 5  # Number of test episodes
log_interval: 1000  # Log every 1000 timesteps

# Training duration
t_max: 1000000  # Total timesteps

name: "transf_qmix_viz"