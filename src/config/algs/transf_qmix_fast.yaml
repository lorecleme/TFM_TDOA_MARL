# --- TransformerQMix FAST - same architecture, higher throughput ---
# Identical architecture to transf_qmix. Only changes: bigger batch, scaled lr, torch.compile.

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 100000

runner: "episode"
buffer_size: 5000
batch_size: 64                    # was 32 — 2× bigger matmuls, ~3 min warmup

# update the target network every {} episodes
target_update_interval: 200

# parameters of the transformer agent (IDENTICAL to transf_qmix)
mac: "n_mac"
agent: "n_transf"
agent_output_type: q
emb: 32
heads: 4
depth: 2
ff_hidden_mult: 4
dropout: 0

# parameters of the transformer mixer (IDENTICAL to transf_qmix)
mixer: "transf_mixer"
mixer_emb: 32
mixer_heads: 4
mixer_depth: 2
qmix_pos_func: "abs"

# parameters for the learner
learner: "nq_transf_fast_learner" # uses torch.compile + inference_mode
weight_decay: 0
optimizer: "adam"
lr: 0.0015                       # was 0.001 — sqrt(64/32) ≈ 1.4× scaling
td_lambda: 0.6

# to keep the token dimension fixed, observation id and last action should not be included
obs_agent_id: False
obs_last_action: False
env_args:
  obs_entity_mode: True
  state_entity_mode: True

name: "transf_qmix_fast"
