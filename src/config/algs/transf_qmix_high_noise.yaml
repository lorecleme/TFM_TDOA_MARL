# --- TransformerQMix tuned for high TDOA noise (noise_std=0.2) ---
# Lower lr and td_lambda to handle noisy rewards; tighter grad clip

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 100000

runner: "episode"
buffer_size: 5000
batch_size: 64

target_update_interval: 200

mac: "n_mac"
agent: "n_transf"
agent_output_type: q
emb: 32
heads: 4
depth: 2
ff_hidden_mult: 4
dropout: 0

mixer: "transf_mixer"
mixer_emb: 32
mixer_heads: 4
mixer_depth: 2
qmix_pos_func: "abs"

learner: "nq_transf_learner"
weight_decay: 0
optimizer: "adam"
lr: 0.0003
td_lambda: 0.3
grad_norm_clip: 5

obs_agent_id: False
obs_last_action: False
env_args:
  obs_entity_mode: True
  state_entity_mode: True

name: "transf_qmix_high_noise"
