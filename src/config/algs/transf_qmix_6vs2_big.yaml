# --- Scaled-up TransformerQMix for 6v2 on A5000 ---
# Doubled capacity, bigger batches, longer exploration.
# Same algorithm, same reward — just more compute per step.

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 400000          # 2x longer — 6 agents need more exploration

runner: "episode"
buffer_size: 10000                   # 2x — more replay diversity
batch_size: 64                        # 2x — better gradient estimates

target_update_interval: 200

mac: "n_mac"
agent: "n_transf"
agent_output_type: q
emb: 64                               # 2x — more capacity for 8 entities
heads: 8                              # 2x — richer attention patterns
depth: 3                              # +1 layer — deeper reasoning
ff_hidden_mult: 4
dropout: 0

mixer: "transf_mixer"
mixer_emb: 64                         # 2x mixer capacity
mixer_heads: 8
mixer_depth: 3
qmix_pos_func: "abs"

learner: "nq_transf_learner"
weight_decay: 0
optimizer: "adam"
lr: 0.0005                            # half lr — bigger model needs gentler updates
td_lambda: 0.6
grad_norm_clip: 10
use_amp: True

obs_agent_id: False
obs_last_action: False
env_args:
  obs_entity_mode: True
  state_entity_mode: True

name: "transf_qmix_6vs2_big"
